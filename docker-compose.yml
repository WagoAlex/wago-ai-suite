version: "3.8"

services:
  wago-ai-suite:
    image: wagoalex/wago-ai-suite-ui:latest
    container_name: wago-ai-suite
    ports:
      - "443:443"
    volumes:
      - /docker/tests:/app
      - /etc/docker/certs:/etc/docker/certs
    environment:
      - REACT_APP_MQTT_BROKER_URL=${REACT_APP_MQTT_BROKER_URL}
      - REACT_APP_MQTT_START_TOPIC=${REACT_APP_MQTT_START_TOPIC}
      - REACT_APP_N8N_API_URL=${REACT_APP_N8N_API_URL}
      - REACT_APP_N8N_REST_API_KEY=${REACT_APP_N8N_REST_API_KEY}
      - SERVER_NAME=${SERVER_NAME}
      - INFERENCE_URL=${INFERENCE_URL}
    depends_on:
      - wago-ai-suite-backend
      - wago-label-studio
    networks:
      - waa_cm_network

  wago-ai-suite-backend:
    image: wagoalex/wago-ai-suite-backend:latest
    container_name: wago-ai-suite-backend
    ports:
      - "3042:3042"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./backend/ssl:/app/ssl
      - /docker/tests:/app/audio
      - /etc/docker/certs:/etc/docker/certs
    environment:
      - API_KEY=${API_KEY}
      - INFERENCE_URL=${INFERENCE_URL}
    networks:
      - waa_cm_network

  wago-label-studio:
    image: heartexlabs/label-studio:latest
    container_name: wago-label-studio
    ports:
      - "8080:8080"
    volumes:
      - /docker/labelstudio/data:/label-studio/data
      - /docker/labelstudio/files:/label-studio/files
    environment:
      - LABEL_STUDIO_DISABLE_SIGNUP_WITHOUT_LINK=true
      - LABEL_STUDIO_USERNAME=alexander.fugmann@wago.com
      - LABEL_STUDIO_PASSWORD=wago1951
      - LABEL_STUDIO_EMAIL=alexander.fugmann@wago.com
      - LABEL_STUDIO_LOCAL_AUTH=True
      - LABEL_STUDIO_HOST=https://192.168.2.165/labelstudio
      - LABEL_STUDIO_URL_PREFIX=/labelstudio

      - LABEL_STUDIO_LOCAL_FILES_SERVING_ENABLED=true
      - LABEL_STUDIO_LOCAL_FILES_DOCUMENT_ROOT=/label-studio/files
      - STATIC_URL=/labelstudio/static/
      - CSRF_TRUSTED_ORIGINS=https://192.168.2.165
      - DJANGO_CSRF_COOKIE_SECURE=false
      - DJANGO_SECURE_SSL_REDIRECT=false
      - DJANGO_SESSION_COOKIE_SECURE=false
      - DJANGO_SESSION_COOKIE_PATH=/labelstudio
      - DJANGO_CSRF_COOKIE_PATH=/labelstudio
      - DJANGO_SESSION_COOKIE_SAMESITE=None
      - DJANGO_CSRF_COOKIE_SAMESITE=None
      - DJANGO_SESSION_COOKIE_HTTPONLY=false
      - DJANGO_CSRF_COOKIE_HTTPONLY=false
      - LABEL_STUDIO_DISABLE_SIGNUP_WITHOUT_LINK=true
      #- LABEL_STUDIO_CSP_DIRECTIVES=default-src 'self' 'unsafe-inline' 'unsafe-eval' https:; frame-src *; img-src * data:; connect-src *; script-src * 'unsafe-inline' 'unsafe-eval'; style-src * 'unsafe-inline'; frame-ancestors *
      - LABEL_STUDIO_CSP_DIRECTIVES="default-src * 'unsafe-inline' 'unsafe-eval' data:; blob:; script-src * 'unsafe-inline' 'unsafe-eval'; frame-ancestors *; frame-src *; connect-src *; img-src * data:; style-src * 'unsafe-inline';"

      - DEBUG=false
      - ALLOWED_HOSTS=*
      - DJANGO_USE_X_FORWARDED_HOST=true
      - DJANGO_USE_X_FORWARDED_PROTO=true
      - DJANGO_FORCE_SCRIPT_NAME=/labelstudio
      - LABEL_STUDIO_DISABLE_CSRF_MIDDLEWARE=false
      - LABEL_STUDIO_CORS_ALLOWED_ORIGINS=https://192.168.2.165
     

    networks:
      - waa_cm_network

volumes:
  wago-label-studio-data:

networks:
  waa_cm_network:
    external: true
